<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAWL PICKER | Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ada-black: #000000;
            --ada-gray: #f2f2f2;
            --text-main: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fff;
        }

        /* 1. 最上部：ロゴエリア */
        .header-top {
            padding: 40px 0;
            text-align: center;
        }

        .main-logo {
            font-weight: 100;
            letter-spacing: 0.5em;
            font-size: 1.8rem;
            text-decoration: none;
            color: var(--ada-black);
        }

        /* 2. ADA風：黒いナビゲーションバー */
        .ada-nav {
            background-color: var(--ada-black);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .ada-nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .ada-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 100;
            letter-spacing: 0.2em;
            transition: opacity 0.3s;
        }

        .ada-nav a:hover {
            opacity: 0.5;
        }

        /* 3. メインビジュアル */
        .hero-view {
            width: 100%;
            height: 80vh;
            background-image: url('hero.jpg'); /* ここにお好みの画像を！ */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 画像の上に薄いオーバーレイ */
        .hero-view::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .hero-text {
            position: relative;
            z-index: 10;
            color: #fff;
            text-align: center;
        }

        .hero-text h2 {
            font-weight: 100;
            font-size: 3rem;
            letter-spacing: 0.3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .ada-nav ul { gap: 15px; }
            .ada-nav a { font-size: 0.6rem; }
            .hero-text h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="header-top">
        <a href="index.html" class="main-logo">BRAWL PICKER</a>
    </div>

    <nav class="ada-nav">
        <ul>
            <li><a href="tool.html">DRAFT CALCULATOR</a></li>
            <li><a href="#database">DATABASE</a></li>
            <li><a href="#journal">JOURNAL</a></li>
            <li><a href="#system">SYSTEM</a></li>
        </ul>
    </nav>

    <div class="hero-view">
        <div class="hero-text">
            <h2>LOGICAL DRAFTING.</h2>
            <p style="font-weight: 100; letter-spacing: 0.2em;">Alpha Version 0.1</p>
        </div>
    </div>

</body>
</html>
