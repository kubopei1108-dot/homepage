<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAWL PICKER | Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        /* ADA風の細いヘッダー */
        header {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        h1 {
            font-weight: 100;
            letter-spacing: 0.2em;
            margin: 0;
            font-size: 1.5rem;
        }
        /* メインビジュアル */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #fafafa; /* ここに後で美しい画像を入れます */
        }
        .hero h2 {
            font-weight: 300;
            letter-spacing: 0.1em;
            font-size: 2rem;
            margin-bottom: 30px;
        }
        /* ツールへの入り口ボタン（ADA風に細く） */
        .enter-button {
            padding: 15px 50px;
            border: 1px solid #333;
            text-decoration: none;
            color: #333;
            font-weight: 300;
            transition: 0.4s;
            letter-spacing: 0.2em;
        }
        .enter-button:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <h1>BRAWL PICKER</h1>
    <nav style="font-size: 0.8rem; letter-spacing: 0.1em;">
        ALPHA VERSION 0.1
    </nav>
</header>

<div class="hero">
    <h2>Logical Drafting.</h2>
    <p style="font-weight: 100; color: #888; margin-bottom: 40px;">美しく、合理的なピックを。</p>
    <a href="tool.html" class="enter-button">ENTER TOOLBOX</a>
</div>

</body>
</html>
