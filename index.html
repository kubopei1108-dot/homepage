<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAWL PICKER | Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ada-black: #000000;
            --ada-dark-gray: #111111;
            --ada-light-gray: #888888;
            --ada-white: #ffffff;
            --ada-accent: #555;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--ada-black);
            color: var(--ada-white);
            overflow-x: hidden;
            height: 100%;
        }

        /* ADA風：最上部ロゴセクション */
        .header-top {
            padding: 50px 0;
            text-align: center;
            background-color: var(--ada-black);
        }

        .main-logo {
            font-weight: 100;
            letter-spacing: 0.7em;
            font-size: 1.6rem;
            text-decoration: none;
            color: var(--ada-white);
            display: inline-block;
            transition: opacity 0.4s;
        }

        /* ADA風：ナビゲーションバー */
        .ada-nav {
            background-color: var(--ada-black);
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .ada-nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .ada-nav a {
            color: var(--ada-white);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            transition: color 0.3s;
            cursor: pointer;
        }

        .ada-nav a:hover {
            color: var(--ada-light-gray);
        }

        /* メインコンテンツエリア */
        .main-content {
            position: relative;
            width: 100%;
            /* ヘッダーとナビの高さを除いた全画面 */
            min-height: calc(100vh - 200px); 
        }

        /* 初期表示：ヒーロービュー */
        .hero-view {
            width: 100%;
            height: 80vh;
            background-color: var(--ada-dark-gray);
            background-image: url('hero.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .hero-copy {
            text-align: center;
            z-index: 10;
        }

        .hero-copy h2 {
            font-weight: 100; font-size: 2.8rem; letter-spacing: 0.5em; margin: 0; text-transform: uppercase;
        }

        /* 計算機埋め込みエリア（最初は非表示） */
        #calculator-container {
            display: none;
            width: 100%;
            height: calc(100vh - 65px); /* ナビバーの高さ分を引く */
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-spacer {
            height: 100px;
            background-color: var(--ada-black);
        }

        @media (max-width: 768px) {
            .ada-nav ul { gap: 20px; }
            .ada-nav a { font-size: 0.6rem; }
            .hero-copy h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="header-top">
        <a href="index.html" class="main-logo">BRAWL PICKER</a>
    </div>

    <nav class="ada-nav">
        <ul>
            <li><a onclick="showCalculator()">DRAFT CALCULATOR</a></li>
            <li><a href="#database">DATABASE</a></li>
            <li><a href="#journal">JOURNAL</a></li>
            <li><a href="#account">ACCOUNT</a></li>
            <li><a href="#support">SUPPORT</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div id="hero-section" class="hero-view">
            <div class="hero-copy">
                <h2>LOGICAL DRAFTING.</h2>
                <p style="font-weight: 100; font-size: 0.9rem; color: #888; letter-spacing: 0.3em; margin-top: 20px;">
                    勝利を、より論理的に、より美しく。
                </p>
            </div>
        </div>

        <div id="calculator-container">
            <iframe src="https://kubopei1108-dot.github.io/draft-app-ver2-copy/"></iframe>
        </div>
    </div>

    <div class="footer-spacer"></div>

    <script>
        function showCalculator() {
            // ヒーローセクションを消して計算機を出す
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('calculator-container').style.display = 'block';
            
            // スムーズに上部へスクロール
            window.scrollTo({top: document.querySelector('.ada-nav').offsetTop, behavior: 'smooth'});
        }
    </script>

</body>
</html>
